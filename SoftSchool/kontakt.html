<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kontakt - Softschool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/soft.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a class="brand" href="softschool.html">Softschool</a>
            <nav>
                <ul>
                    <li><a href="softschool.html">Hem</a></li>
                    <li><a href="uppgifter.html">Uppgifter</a></li>
                    <li><a href="kontakt.html">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <h1>Kontakt</h1>
            <p>Kontakta oss om du har frågor.</p>
            <form action="#" method="post">
                <label for="email">E-post:</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Ärende:</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Meddelande:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Skicka</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Softschool. Alla rättigheter förbehållna.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
